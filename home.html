<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WiMAX Portal — Accueil</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-home">
    <div class="app-shell app-shell--home">
      <header class="page-header page-header--white page-header--home page-header--title-only">
        <h1 class="page-header__title">WiMAX Portal</h1>
      </header>

      <section class="home-hero" aria-label="Identité WiMAX">
        <div class="home-deco" aria-hidden="true">
          <div class="home-deco__side home-deco__side--tower">
            <img
              class="home-deco__img"
              src="WhatsApp%20Image%202026-04-03%20at%2010.53.33.jpeg"
              alt=""
              width="160"
              height="140"
              loading="lazy"
              decoding="async"
              onerror="this.classList.add('home-deco__img--missing')"
            />
            <svg class="home-deco__svg" viewBox="0 0 80 120" width="80" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" d="M40 8v104M18 28h44M14 48h52M10 68h60M8 88h64" />
              <path stroke="currentColor" stroke-width="1.8" d="M40 8L22 118M40 8L58 118" opacity="0.55" />
            </svg>
          </div>
          <div class="home-deco__side home-deco__side--dish">
            <img
              class="home-deco__img"
              src="WhatsApp%20Image%202026-04-03%20at%2013.31.36.jpeg"
              alt=""
              width="160"
              height="140"
              loading="lazy"
              decoding="async"
              onerror="this.classList.add('home-deco__img--missing')"
            />
            <svg class="home-deco__svg" viewBox="0 0 100 90" width="100" height="90" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="50" cy="38" rx="38" ry="14" stroke="currentColor" stroke-width="2" />
              <path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M50 52v32M38 84h24" />
              <circle cx="50" cy="38" r="3" fill="currentColor" opacity="0.35" />
            </svg>
          </div>
        </div>
        <div class="home-hero__brand">
          <img class="home-brand__logo" src="assets/wimax_logo.webp" alt="WiMAX" width="220" height="auto" />
          <p class="home-hero__tag">Portail pédagogique &amp; technique</p>
        </div>
      </section>

      <p class="home-modules-label">Modules</p>
      <nav class="home-grid" aria-label="Navigation principale">
        <a class="home-tile" href="wimax.html">
          <span class="home-tile__icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path
                d="M12 18c2.28 0 4.22-.98 5.65-2.5M12 18c-2.28 0-4.22-.98-5.65-2.5M12 18v-3M6.35 15.5A7 7 0 0112 5c2.76 0 5.26 1.66 6.35 4M6.35 15.5L4 18M17.65 15.5L20 18"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <rect x="2" y="14" width="20" height="6" rx="1.5" stroke="currentColor" stroke-width="1.8" />
            </svg>
          </span>
          <span class="home-tile__label">WiMAX</span>
        </a>
        <a class="home-tile" href="scenarios.html">
          <span class="home-tile__icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <circle cx="6" cy="6" r="2.5" stroke="currentColor" stroke-width="1.8" />
              <circle cx="18" cy="6" r="2.5" stroke="currentColor" stroke-width="1.8" />
              <circle cx="12" cy="18" r="2.5" stroke="currentColor" stroke-width="1.8" />
              <path d="M8 7.5h8M12 8.5v7M7.5 16.5l9-5" stroke="currentColor" stroke-width="1.5" />
            </svg>
          </span>
          <span class="home-tile__label">Scénarios</span>
        </a>
        <a class="home-tile" href="maquette.html">
          <span class="home-tile__icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M12 3v18M5 8l7-5 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M8 21h8M9 14h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </span>
          <span class="home-tile__label">Maquette</span>
        </a>
        <a class="home-tile" href="quiz.html">
          <span class="home-tile__icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8" />
              <path d="M9 10h6M9 14h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <circle cx="15" cy="16" r="3" fill="currentColor" />
              <path d="M14 16h2" stroke="#fff" stroke-width="1.2" stroke-linecap="round" />
            </svg>
          </span>
          <span class="home-tile__label">Quiz</span>
        </a>
        <a class="home-tile home-tile--wide" href="galerie.html">
          <span class="home-tile__icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6" />
            </svg>
          </span>
          <span class="home-tile__label">Galerie</span>
        </a>
      </nav>

      <p class="home-footer-tagline">Internet à longue distance sans fibre optique</p>
    </div>

    <div class="fab-share">
      <span class="fab-share__label">Partager l'accès</span>
      <a class="fab-share__btn" href="share-qr.html" aria-label="Partager l'accès">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path
            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"
          />
        </svg>
      </a>
    </div>

    <script>
      document.body.classList.add("page-enter");
      requestAnimationFrame(function () {
        document.body.classList.add("page-enter-active");
      });
    </script>
  </body>
</html>
